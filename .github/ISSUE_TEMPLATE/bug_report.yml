name: 🐞 Bug report
description: Report a problem with Profferio
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping us improve Profferio! Please fill in the details below.
  - type: input
    id: company
    attributes:
      label: Company / instance
      description: Which Profferio instance are you on? (e.g. company.profferio.com)
      placeholder: company.profferio.com
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: How severe is it?
      options:
        - Low — minor annoyance
        - Medium — affects my work
        - High — blocks my work
        - Critical — system unusable
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / device
      placeholder: Chrome on Windows 11, iPhone Safari, ...
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop any screenshots here.
    validations:
      required: false
